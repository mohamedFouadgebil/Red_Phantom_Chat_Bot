<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Phantom Documentation</title>
    <link rel="icon" href="./Images/Red Phantom.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #0b0d12;
        color: #e5e7eb;
        display: flex;
        min-height: 100vh;
        overflow-x: hidden;
        flex-direction: row;
        opacity: 0;
        animation: fadeIn 1s ease forwards;
      }
      @keyframes fadeIn { to { opacity: 1; } }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-thumb { background: #ff003c; border-radius: 10px; }

      header {
        position: fixed;
        top: 0;
        left: 250px;
        right: 0;
        padding: 15px 25px;
        background: rgba(11, 13, 18, 0.8);
        backdrop-filter: blur(12px);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1f2937;
        z-index: 100;
        transform: translateY(-50px);
        animation: slideDown 0.8s ease forwards 0.3s;
      }
      @keyframes slideDown { to { transform: translateY(0); } }

      header h1 {
        margin: 0;
        color: #ff2d39;
        font-size: 20px;
        text-shadow: 0 0 10px #ff2d39;
        font-weight: 900;
      }
      header nav { display: flex; gap: 15px; }
      header a {
        text-decoration: none;
        color: #9ca3af;
        transition: 0.2s;
        font-size: 14px;
      }
      header a:hover { color: #fff; }

      .sidebar {
        width: 250px;
        background: #11141a;
        border-right: 1px solid #1f2937;
        padding-top: 80px;
        overflow-y: auto;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 90;
        transition: 0.3s ease;
      }

      .sidebar h2 {
        text-align: center;
        font-size: 18px;
        color: #ff4757;
        margin-bottom: 15px;
      }

      .tool-item {
        padding: 12px 20px;
        cursor: pointer;
        font-size: 14px;
        border-bottom: 1px solid #1f2937;
        transition: 0.25s;
      }
      .tool-item:hover { background: #1a1d25; color: #ff4757; }
      .tool-item.active { background: #ff2d39; color: #fff; }

      .content {
        margin-left: 250px;
        padding: 100px 30px 40px;
        flex: 1;
        width: 100%;
        box-sizing: border-box;
        opacity: 0;
        transform: translateY(20px);
        transition: 0.5s ease;
      }
      .content.show { opacity: 1; transform: translateY(0); }

      .tool-title {
        font-size: 32px;
        font-weight: 900;
        margin-bottom: 10px;
        color: #fff;
      }

      .description {
        font-size: 16px;
        opacity: 0.85;
        line-height: 1.7;
        margin-bottom: 20px;
      }

      .section-title {
        font-size: 20px;
        margin-top: 25px;
        color: #ff2d39;
        font-weight: 700;
      }

      .tag {
        display: inline-block;
        background: #1a1d25;
        padding: 5px 12px;
        border-radius: 8px;
        margin: 5px 5px 0 0;
        border: 1px solid #ff2d3944;
        color: #ff2d39;
        font-size: 12px;
      }

      .example-box {
        background: #11141a;
        border: 1px solid #1f2937;
        padding: 15px;
        border-radius: 10px;
        margin-top: 10px;
        font-size: 14px;
      }

      .btns {
        margin-top: 30px;
        display: flex;
        gap: 10px;
      }

      .action-btn {
        padding: 12px 20px;
        border-radius: 8px;
        text-decoration: none;
        background: #ff2d39;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        text-align: center;
        flex: 1;
        max-width: 200px;
      }

      @media (max-width: 850px) {
        header { left: 0; padding: 15px; }
        .sidebar {
          transform: translateX(-100%);
          width: 200px;
        }
        .sidebar.open { transform: translateX(0); }
        .content { margin-left: 0; padding-top: 80px; }
        .tool-title { font-size: 26px; }
        .menu-toggle {
          display: block !important;
          color: #fff;
          font-size: 20px;
          cursor: pointer;
        }
      }

      .menu-toggle { display: none; }
    </style>
  </head>
  <body>
    <div class="sidebar" id="sidebar">
      <h2>Tools</h2>
      <div id="tools-list"></div>
    </div>

    <header>
      <i class="fas fa-bars menu-toggle" onclick="toggleSidebar()"></i>
      <h1>Red Phantom Docs</h1>
      <nav>
        <a href="https://bot-ruby-delta.vercel.app/index.html">Home</a>
        <a href="index.html">Chat</a>
      </nav>
    </header>

    <div class="content" id="content">
      <h1 class="tool-title">Select a Tool</h1>
      <p class="description">Choose a tool from the sidebar to view its documentation.</p>
    </div>

    <script>
      const tools = [
        {
          slug: "nmap",
          name: "Nmap",
          description: "Nmap (Network Mapper) is a sophisticated and highly versatile network scanning tool used to gain a comprehensive understanding of network architecture.",
          tags: ["network", "scan", "security"],
          examples: ["Performing a full network audit on enterprise infrastructure.", "Scanning cloud-based systems for open ports."],
          protection: "Deploy firewalls, enable IDS/IPS, and close unnecessary ports.",
          remediation: "Block suspicious IPs and audit exposed services."
        },
        {
          slug: "wireshark",
          name: "Wireshark",
          description: "Wireshark is a packet analysis platform that allows professionals to capture and decode network traffic at an exceptional level of granularity.",
          tags: ["analysis", "protocols", "monitoring"],
          examples: ["Analyzing encrypted HTTPS traffic.", "Monitoring ARP broadcast patterns."],
          protection: "Use encrypted protocols (HTTPS, TLS) and VPNs.",
          remediation: "Disconnect from affected networks and rotate credentials."
        },
        {
          slug: "metasploit",
          name: "Metasploit",
          description: "Metasploit is an industry-standard penetration testing framework used to simulate real-world cyberattacks and assess defenses.",
          tags: ["pentest", "exploitation", "training"],
          examples: ["Simulating attacks to evaluate resilience.", "Assessment of internal monitoring processes."],
          protection: "Keep systems updated and enforce strict permissions.",
          remediation: "Isolate affected devices and restore from backups."
        },
        {
          slug: "encrypt",
          name: "Encryption Tool",
          description: "State-of-the-art cryptographic algorithms to secure sensitive files and folders, ensuring confidentiality.",
          tags: ["encryption", "privacy", "files"],
          examples: ["Encrypting source code repositories.", "Securing financial documents."],
          protection: "Store keys securely and use strong passwords.",
          remediation: "Recover files using trusted backups and stored keys."
        },
        {
            slug: "decrypt",
            name: "Decryption Tool",
            description: "Reverses encryption to restore files to their original readable format using the correct key.",
            tags: ["decryption", "recovery", "security"],
            examples: ["Restoring client archives for forensic analysis.", "Decrypting backup containers."],
            protection: "Limit access to decryption keys.",
            remediation: "Audit key usage and rotate keys if unauthorized access occurs."
        },
        {
            slug: "keylogger",
            name: "Keylogger (Concept)",
            description: "A conceptual tool to demonstrate how keystrokes can be captured to obtain sensitive data.",
            tags: ["concept", "awareness", "endpoint"],
            examples: ["Training personnel to detect input-hooking.", "Demonstrating EDR prevention."],
            protection: "Use reliable antivirus and multi-factor authentication.",
            remediation: "Isolate device, remove malware, and change passwords."
        },
        {
            slug: "network-scan",
            name: "Network Scanner",
            description: "Identifies active devices and collects information such as IP, MAC, and open ports.",
            tags: ["scanner", "devices", "monitoring"],
            examples: ["Mapping IoT devices for asset management.", "Detecting unauthorized Wi-Fi devices."],
            protection: "Deploy VLAN segmentation and access control.",
            remediation: "Isolate suspicious devices and update access policies."
        },
        {
            slug: "arp-spoofing",
            name: "ARP Spoofing (Concept)",
            description: "Injection of forged ARP packets to intercept or redirect network traffic.",
            tags: ["mitm", "network", "concept"],
            examples: ["Simulating ARP poisoning in lab environments.", "Evaluating mitigation in corporate networks."],
            protection: "Enable DAI (Dynamic ARP Inspection) and static ARP entries.",
            remediation: "Reset ARP tables and perform network forensics."
        },
        {
            slug: "track-website",
            name: "Website Tracker",
            description: "Collects intelligence about domains, including DNS, SSL, and hosting details.",
            tags: ["web", "analysis", "intelligence"],
            examples: ["Analyzing SSL certificate chains.", "Detecting subdomain takeover risks."],
            protection: "Enforce HTTPS and apply DNSSEC.",
            remediation: "Strengthen DNS setups and update monitoring."
        },
        {
            slug: "track-phone",
            name: "Phone Number Tracker",
            description: "Provides public info about phone numbers like carrier, region, and validity.",
            tags: ["phone", "tracking", "verification"],
            examples: ["Validating international numbers.", "Identifying carriers of suspicious calls."],
            protection: "Avoid sharing personal numbers publicly.",
            remediation: "Contact carrier to change number or increase privacy."
        }
      ];

      const toolsList = document.getElementById("tools-list");
      const content = document.getElementById("content");
      const sidebar = document.getElementById("sidebar");

      tools.forEach((tool) => {
        const item = document.createElement("div");
        item.className = "tool-item";
        item.textContent = tool.name;
        item.onclick = () => loadTool(tool.slug);
        toolsList.appendChild(item);
      });

      function toggleSidebar() {
        sidebar.classList.toggle("open");
      }

      function loadTool(slug) {
        if (window.innerWidth <= 850) sidebar.classList.remove("open");
        
        document.querySelectorAll(".tool-item").forEach(i => i.classList.remove("active"));
        const tool = tools.find(t => t.slug === slug);
        event.currentTarget.classList.add("active");

        content.classList.remove("show");

        setTimeout(() => {
          content.innerHTML = `
            <h1 class="tool-title">${tool.name}</h1>
            <p class="description">${tool.description}</p>
            <h3 class="section-title">Tags</h3>
            ${tool.tags.map(t => `<span class="tag">${t}</span>`).join("")}
            <h3 class="section-title">Examples</h3>
            ${tool.examples.map(e => `<div class="example-box">${e}</div>`).join("")}
            <h3 class="section-title">Protection</h3>
            <div class="example-box">${tool.protection}</div>
            <h3 class="section-title">Remediation</h3>
            <div class="example-box">${tool.remediation}</div>
            <div class="btns">
              <a href="#" class="action-btn">More Info</a>
              <a href="#" class="action-btn">Try Tool</a>
            </div>
          `;
          content.classList.add("show");
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 200);
      }
    </script>
  </body>
</html>
